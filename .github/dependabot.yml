version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "production"
    groups:
      all-pip-updates:
        patterns: ["*"]
    
  - package-ecosystem: "npm"
    directory: "/frontend/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "svelte"
        update-types: ["version-update:semver-major"]
    groups:
      all-npm-updates:
        patterns: ["*"]