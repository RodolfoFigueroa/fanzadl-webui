repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.14
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix-only ]
    # Run the formatter.
    - id: ruff-format
- repo: https://github.com/biomejs/pre-commit
  rev: v2.4.15
  hooks:
    - id: biome-check
      additional_dependencies: ['@biomejs/biome@2.4.15']